# Kontakt Électricité - Configuration Jekyll
title: Kontakt Électricité
description: "Électricien résidentiel à Paris, Île-de-France et dans le Lot (46). Installation, rénovation, mise aux normes, dépannage, domotique. En formation CAP Électricien, déjà sur le terrain."
url: "https://www.kontakt-electricite.fr"
baseurl: ""

# Contact
email: mathieu@kontakt-electricite.fr
phone: +33 6 49 92 78 41
linkedin: https://www.linkedin.com/company/l-artisan-2-0
instagram: https://www.instagram.com/lartisan2.0
facebook: https://www.facebook.com/lartisan20

# Avis Google : note et nombre d'avis (affichés dans le hero et section avis)
google_rating: "5,0"
google_review_count: 4
# Lien vers votre page Google Business (bouton "Voir tous les avis sur Google")
google_reviews_url: "https://www.google.com/search?hl=fr-FR&sca_esv=a5908d9afcf34126&cs=1&sxsrf=ANbL-n43O4vMLBnFQqsa2dhXAdcQChV5Yg:1769716181853&q=L%27artisan+2.0&si=AL3DRZEsmMGCryMMFSHJ3StBhOdZ2-6yYkXd_doETEE1OR-qOcge5qDG8bODwVg-ZPx3SBWIJFRgKjV4_w526K-GaqG1IsaQefGKaqbucrMVfpcgdJNRaEM%3D&uds=ALYpb_kKdx-oX15sdjMUmdmJV1RhZXeeRjrhL19VVvUiqjrbvhNlSHeTI1nDwH_9elGDK1p_FPsIwxIju4n3REAyDsDoRMuZpDJV-J5xUdDB0TJnLFD5Imc&sa=X&ved=2ahUKEwiOpf3CwrGSAxUeTqQEHVEoJ40Q3PALegQIFxAE&biw=1680&bih=921&dpr=1.8&aic=0"

# Zone d'intervention
zone: Paris, Île-de-France & Lot (46)

# Build settings
markdown: kramdown
future: true
permalink: pretty

# Plugins
plugins:
  - jekyll-sitemap
  - jekyll-redirect-from
  - jekyll-feed

# RSS Feed
feed:
  excerpt_only: true

# Includes (dossiers commençant par . normalement exclus par Jekyll)
include:
  - .well-known

# Excludes
exclude:
  - README.md
  - Gemfile
  - Gemfile.lock
  - node_modules
  - vendor
  - .sass-cache
  - .jekyll-cache

# Default front matter
defaults:
  - scope:
      path: ""
    values:
      layout: "default"
  - scope:
      path: "_posts"
    values:
      layout: "blog"
      permalink: /blog/:year/:month/:day/:title/
  # Sitemap : exclure les fichiers non-HTML du sitemap auto-généré
  - scope:
      path: "llms.txt"
    values:
      sitemap: false
  - scope:
      path: "robots.txt"
    values:
      sitemap: false
  - scope:
      path: "site.webmanifest"
    values:
      sitemap: false
  - scope:
      path: "CNAME"
    values:
      sitemap: false
  - scope:
      path: ".well-known/llms.txt"
    values:
      sitemap: false
